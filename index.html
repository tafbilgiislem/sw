<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Akıllı Ekran - V47 (Döviz + Otomatik SVG Yenileme)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        .swiper { width: 100%; height: 100%; }
        .swiper-slide { display: flex; align-items: center; justify-content: center; background: #000; }
        .swiper-slide object { width: 100%; height: 100%; object-fit: contain; pointer-events: none; border: none; }
    </style>
</head>
<body>
    <div class="swiper mySwiper"><div class="swiper-wrapper" id="slide-container"></div></div>
    
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // --- AYARLAR VE API YAPILANDIRMASI ---
        const SWIPER_CONFIG = { speed: 1500, effect: 'cards' };
        const WEATHER_API_KEY = "97fe4c9ee7efb72f3e0520ceb21bba8b"; // OpenWeatherMap anahtarınız
        const CITY = "Istanbul";
        
        let currentSettingsString = ""; 
        let currentHtmlString = "";
        let svgVersions = {}; // SVG dosyalarının son değiştirilme tarihlerini tutar
        
        let swiperInstance = null;
        let intervalIds = [];
        let liveData = { temp: "--", usd: "--", eur: "--" };

        // 1. CANLI VERİLERİ ÇEKME FONKSİYONLARI (Döviz API'si güncellendi)
        async function updateLiveData() {
            try {
                // Hava Durumu
                const wRes = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY}&appid=${WEATHER_API_KEY}&units=metric&lang=tr`);
                if (wRes.ok) {
                    const wData = await wRes.json();
                    liveData.temp = Math.round(wData.main.temp) + "°C";
                }

                // Döviz (Daha stabil çalışan yeni ücretsiz API)
                const cRes = await fetch("https://open.er-api.com/v6/latest/USD");
                if (cRes.ok) {
                    const cData = await cRes.json();
                    liveData.usd = cData.rates.TRY.toFixed(2) + " TL";
                    // Euro'yu bulmak için Çapraz Kur: TRY / EUR
                    liveData.eur = (cData.rates.TRY / cData.rates.EUR).toFixed(2) + " TL";
                }
            } catch (e) { 
                console.warn("Canlı veri güncellemesi sırasında hata oluştu.", e.message); 
            }
        }

        // 2. SVG İÇİNE VERİ ENJEKTE ETME
        function injectDataToSVG(svgDoc) {
            if (!svgDoc) return;
            const elements = {
                "hava-durumu": liveData.temp,
                "dolar-kur": liveData.usd,
                "euro-kur": liveData.eur,
                "guncel-saat": new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' })
            };

            for (let [id, val] of Object.entries(elements)) {
                const el = svgDoc.getElementById(id);
                if (el) el.textContent = val;
            }
        }

        // Genel yenileme (4 saat)
        setTimeout(() => window.location.reload(), 4 * 60 * 60 * 1000);

        function clearAllIntervals() { intervalIds.forEach(clearInterval); intervalIds = []; }

        async function initSlider() {
            try {
                clearAllIntervals();
                if (swiperInstance !== null) swiperInstance.destroy(true, true);
                
                await updateLiveData(); 
                const timerData = setInterval(updateLiveData, 10 * 60 * 1000);
                intervalIds.push(timerData);

                let cacheBuster = Math.floor(Date.now() / 30000);
                const setRes = await fetch('settings.json?t=' + cacheBuster);
                const settings = await setRes.json();
                currentSettingsString = JSON.stringify(settings);

                try {
                    const htmlRes = await fetch(window.location.href.split('?')[0] + '?t=' + cacheBuster);
                    currentHtmlString = await htmlRes.text();
                } catch(e) {}

                // YENİ: Başlangıçta tüm SVG dosyalarının son değiştirilme tarihlerini kaydet
                for (let slide of settings) {
                    try {
                        const hRes = await fetch(slide.file + '?t=' + cacheBuster, { method: 'HEAD' });
                        svgVersions[slide.file] = hRes.headers.get('Last-Modified') || hRes.headers.get('content-length');
                    } catch(e) {}
                }
                
                const container = document.getElementById('slide-container'); 
                container.innerHTML = ""; 
                
                for (let slide of settings) {
                    const slideDiv = document.createElement('div');
                    slideDiv.className = 'swiper-slide';
                    slideDiv.setAttribute('data-swiper-autoplay', slide.duration || 5000);
                    
                    const obj = document.createElement("object");
                    obj.data = slide.file + '?v=' + cacheBuster; 
                    obj.type = "image/svg+xml"; 

                    obj.addEventListener('load', function() {
                        const svgDoc = obj.contentDocument;
                        if (!svgDoc) return;

                        const clockTimer = setInterval(() => injectDataToSVG(svgDoc), 1000);
                        intervalIds.push(clockTimer);

                        const setupRotation = (id, images) => {
                            const imgEl = svgDoc.getElementById(id);
                            if (imgEl && images?.length > 0) {
                                let idx = 0;
                                const timer = setInterval(() => {
                                    if (settings.length > 1 && !slideDiv.classList.contains("swiper-slide-active")) return;
                                    idx = (idx + 1) % images.length;
                                    imgEl.setAttribute("href", images[idx]);
                                }, 3000);
                                intervalIds.push(timer);
                            }
                        };

                        if (slide.rotations) {
                            slide.rotations.forEach(rot => setupRotation(rot.id, rot.images));
                        }
                    });
                    
                    slideDiv.appendChild(obj); 
                    container.appendChild(slideDiv);
                }

                setTimeout(() => {
                    swiperInstance = new Swiper('.mySwiper', {
                        effect: SWIPER_CONFIG.effect, speed: SWIPER_CONFIG.speed, loop: settings.length > 1,
                        autoplay: settings.length > 1 ? { delay: 5000, disableOnInteraction: false } : false,
                        cubeEffect: { shadow: true, slideShadows: true, shadowOffset: 20, shadowScale: 0.94 }
                    });
                }, 100);
                
                // Arka plan kod değişikliği kontrolü
                const checkUpdate = setInterval(async () => {
                    try {
                        let currentCacheBuster = Math.floor(Date.now()/10000);

                        // 1. JSON Kontrolü
                        const r = await fetch('settings.json?t=' + currentCacheBuster);
                        const nConf = await r.json();
                        if (JSON.stringify(nConf) !== currentSettingsString) {
                            window.location.reload();
                            return;
                        }

                        // 2. HTML Kontrolü
                        if (currentHtmlString !== "") {
                            const htmlCheckRes = await fetch(window.location.href.split('?')[0] + '?t=' + currentCacheBuster);
                            const newHtmlString = await htmlCheckRes.text();
                            if (newHtmlString !== currentHtmlString) {
                                window.location.reload();
                                return;
                            }
                        }

                        // 3. YENİ: SVG Dosyalarının Anlık Kontrolü
                        for (let slide of nConf) {
                            const hRes = await fetch(slide.file + '?t=' + currentCacheBuster, { method: 'HEAD' });
                            const currentMod = hRes.headers.get('Last-Modified') || hRes.headers.get('content-length');
                            
                            if (svgVersions[slide.file] && currentMod && currentMod !== svgVersions[slide.file]) {
                                window.location.reload(); // SVG değiştirilmiş, sayfayı hemen yenile
                                return;
                            }
                        }

                    } catch (e) {}
                }, 10000); // 10 saniyede bir kontrol et
                intervalIds.push(checkUpdate);

            } catch (error) { setTimeout(initSlider, 5000); }
        }
        
        initSlider();
    </script>
</body>
</html>
