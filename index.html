<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Ekran Oynatıcı - Swiper TV Optimize V45</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        .swiper { width: 100%; height: 100%; }
        .swiper-slide { display: flex; align-items: center; justify-content: center; background: #000; }
        .swiper-slide object { width: 100%; height: 100%; object-fit: contain; pointer-events: none; border: none; }
    </style>
</head>
<body>
    <div class="swiper mySwiper"><div class="swiper-wrapper" id="slide-container"></div></div>
    
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const SWIPER_CONFIG = { speed: 2500, effect: 'fade' };
        let currentSettingsString = ""; 
        let currentHtmlString = "";
        let swiperInstance = null;
        let intervalIds = []; // Bellek yönetimi için döngüleri takip eden dizi

        // Tam ekran ve periyodik sayfa yenileme
        setTimeout(() => { const d = document.documentElement; const r = d.requestFullscreen || d.webkitRequestFullScreen || d.mozRequestFullScreen || d.msRequestFullscreen; if (r) r.call(d).catch(e=> console.warn("Tam ekran engellendi:", e)); }, 5000);
        setTimeout(() => window.location.reload(), 4 * 60 * 60 * 1000);

        // Tüm aktif döngüleri temizleme fonksiyonu (RAM şişmesini önler)
        function clearAllIntervals() {
            intervalIds.forEach(clearInterval);
            intervalIds = [];
        }

        async function initSlider() {
            try {
                // Her yeni başlatmada eski ayarları ve döngüleri sıfırla
                clearAllIntervals();
                if (swiperInstance !== null) {
                    swiperInstance.destroy(true, true);
                    swiperInstance = null;
                }

                let cacheBuster = Math.floor(Date.now() / 30000);
                
                // Ayarları Çek
                const setRes = await fetch('settings.json?t=' + cacheBuster);
                const settings = await setRes.json();
                currentSettingsString = JSON.stringify(settings);

                // HTML'i Çek
                try {
                    const htmlRes = await fetch(window.location.href.split('?')[0] + '?t=' + cacheBuster);
                    currentHtmlString = await htmlRes.text();
                } catch(e) { console.warn("HTML başlangıçta okunamadı:", e); }
                
                const container = document.getElementById('slide-container'); 
                container.innerHTML = ""; 
                
                // Slaytları Oluştur
                for (let slide of settings) {
                    const slideDiv = document.createElement('div');
                    slideDiv.className = 'swiper-slide';
                    slideDiv.setAttribute('data-swiper-autoplay', slide.duration || 5000);
                    
                    const obj = document.createElement("object");
                    obj.data = slide.file + '?v=' + cacheBuster; 
                    obj.type = "image/svg+xml";

                    obj.addEventListener('load', function() {
                        try {
                            const svgDoc = obj.contentDocument; 
                            if (!svgDoc) return;
                            
                            const setupRotation = (id, images) => {
                                const imgEl = svgDoc.getElementById(id);
                                if (imgEl && images && images.length > 0) {
                                    let idx = 0; 
                                    imgEl.setAttribute("href", images[0]); 
                                    imgEl.setAttributeNS("http://www.w3.org/1999/xlink", "href", images[0]);
                                    
                                    const timer = setInterval(() => {
                                        if (settings.length > 1 && !slideDiv.classList.contains("swiper-slide-active") && !slideDiv.classList.contains("swiper-slide-duplicate-active")) return;
                                        idx = (idx + 1) % images.length; 
                                        imgEl.setAttribute("href", images[idx]); 
                                        imgEl.setAttributeNS("http://www.w3.org/1999/xlink", "href", images[idx]);
                                    }, 3000);
                                    intervalIds.push(timer); // Döngüyü listeye ekle
                                }
                            };

                            // JSON'dan gelen dinamik rotasyon varsa onu kullan, yoksa varsayılanı kullan (Geriye dönük uyumluluk)
                            if (slide.rotations && Array.isArray(slide.rotations)) {
                                slide.rotations.forEach(rot => setupRotation(rot.id, rot.images));
                            } else {
                                setupRotation("degisen-resim-1", ["resim1.jpg", "resim2.jpg", "resim3.jpg"]);
                                setupRotation("degisen-resim-2", ["resim4.jpg", "resim5.jpg", "resim6.jpg"]);
                            }
                        } catch(e) { console.error("SVG İşleme Hatası:", e); }
                    });
                    
                    slideDiv.appendChild(obj); 
                    container.appendChild(slideDiv);
                }

                // Swiper'ı Başlat
                setTimeout(() => {
                    swiperInstance = new Swiper('.mySwiper', {
                        effect: SWIPER_CONFIG.effect, speed: SWIPER_CONFIG.speed, grabCursor: true, loop: settings.length > 1, observer: true, observeParents: true,
                        autoplay: settings.length > 1 ? { delay: 5000, disableOnInteraction: false } : false,
                        cubeEffect: { shadow: true, slideShadows: true, shadowOffset: 20, shadowScale: 0.94 },
                        coverflowEffect: { rotate: 50, stretch: 0, depth: 100, modifier: 1, slideShadows: true },
                        cardsEffect: { slideShadows: true }
                    });
                }, 100);
                
                // Arka Plan Değişiklik Kontrolcüsü
                const checkTimer = setInterval(async () => {
                    try {
                        let currentCacheBuster = Math.floor(Date.now() / 10000);

                        const r = await fetch('settings.json?t=' + currentCacheBuster);
                        const nConf = await r.json();
                        if (JSON.stringify(nConf) !== currentSettingsString) {
                            window.location.reload();
                            return;
                        }

                        if (currentHtmlString !== "") {
                            const htmlCheckRes = await fetch(window.location.href.split('?')[0] + '?t=' + currentCacheBuster);
                            const newHtmlString = await htmlCheckRes.text();
                            
                            if (newHtmlString !== currentHtmlString) {
                                window.location.reload();
                            }
                        }
                    } catch (e) { /* Ağ hatası durumunda sessiz kal */ }
                }, 10000);
                intervalIds.push(checkTimer);

            } catch (error) { 
                console.error("Başlatma Hatası:", error);
                setTimeout(initSlider, 5000); 
            }
        }
        
        initSlider();
    </script>
</body>
</html>
